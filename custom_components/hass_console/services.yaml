write_log:
  name: Write Log Entry
  description: Manually write a LOG row to hass-console-logs.csv
  fields:
    entity:
      name: Entity
      required: true
      example: "hass_console.log_daily_kwh"
      selector:
        text:
    category:
      name: Category
      description: System type (e.g. HVAC, E-METER, GPS)
      required: false
      selector:
        text:
    value:
      name: Value
      required: false
      selector:
        text:
    note:
      name: Note
      required: false
      selector:
        text:

write_alarm:
  name: Write Alarm Entry
  description: Manually write an ALARM row to hass-console-alarms.csv
  fields:
    entity:
      name: Entity
      required: true
      example: "hass_console.alarm_temperature_alarm"
      selector:
        text:
    category:
      name: Category
      required: false
      selector:
        text:
    class:
      name: Class
      description: Alarm severity (01, 02, 03)
      required: false
      selector:
        text:
    value:
      name: Value
      required: false
      selector:
        text:
    duration:
      name: Duration
      required: false
      selector:
        text:
    note:
      name: Note
      required: false
      selector:
        text:
    trigger:
      name: Trigger
      required: false
      selector:
        text:

acknowledge_alarm:
  name: Acknowledge Alarm
  description: Mark a single alarm as acknowledged by its ID
  fields:
    id:
      name: Alarm ID
      description: The unique ID of the alarm row (from the CSV id column)
      required: true
      example: "a1b2c3d4"
      selector:
        text:
    note:
      name: Note
      description: Optional acknowledgment note
      required: false
      selector:
        text:

acknowledge_all:
  name: Acknowledge All Alarms
  description: Mark all unacknowledged alarms as acknowledged
  fields:
    note:
      name: Note
      description: Optional acknowledgment note
      required: false
      selector:
        text:

reload:
  name: Reload HASS Console
  description: Reload the engine (re-reads config, restarts all listeners)
